<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f4f5f8">
  <title>KSB LabelPrint</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#e3e6ec;color:#151618;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.loader{display:grid;gap:14px;place-items:center;padding:30px;border-radius:28px;background:rgba(255,255,255,.82);box-shadow:0 20px 70px rgba(20,30,50,.12)}.spinner{width:34px;height:34px;border:3px solid #d8dde8;border-top-color:#364c84;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loader"><div class="spinner"></div><strong>Loading KSB LabelPrint…</strong></div>
  <script src="app/part-01.js"></script>
  <script src="app/part-02.js"></script>
  <script src="app/part-03.js"></script>
  <script src="app/part-04.js"></script>
  <script src="app/part-05.js"></script>
  <script src="app/part-06.js"></script>
  <script src="app/part-07.js"></script>
  <script src="app/part-08.js"></script>
  <script>
    (()=>{
      try{
        const raw=atob(window.__KSB_LABELPRINT_B64||'');
        const bytes=Uint8Array.from(raw,c=>c.charCodeAt(0));
        const html=new TextDecoder('utf-8').decode(bytes);
        document.open();document.write(html);document.close();
      }catch(error){
        document.body.innerHTML='<div class="loader"><strong>Unable to load the mockup.</strong><small>'+String(error)+'</small></div>';
      }
    })();
  </script>
</body>
</html>
